<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISKCON ABIDS Dioramas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <nav class="navbar">
    <div class="logo">
      <img src="images/logo.jpg" class="logo-img">
      <span>ISKCON <br> ABIDS</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="#about">About</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h1>Krishna's Divine Pastimes</h1>
      <p>Walk through the sacred stories of the Lord, brought to life through art and devotion</p>
      <a href="#dioramas" class="btn">Explore Dioramas</a>
    </div>
  </section>

  <section class="dioramas-section" id="dioramas">
    <p class="section-label">Sacred Pastimes</p>
    <h2 class="section-title">The Divine Lila</h2>
    <p class="section-subtitle">Select a diorama to explore the story</p>

    <!--
      Cards are rendered here by renderDioramaCards() below.
      To reorder or add cards, edit js/pastime-registry.js only.
    -->
    <div class="dioramas-grid" id="dioramas-grid"></div>
  </section>

  <button class="chat-toggle" onclick="toggleChat()">Ask Krishna</button>

  <div class="chat-window" id="chat-window">
    <div class="chat-header">
      <span>🛕 Krishna's Guide</span>
      <button onclick="toggleChat()" class="chat-close">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="Ask about Krishna..." onkeypress="handleKey(event)" />
      <button onclick="sendMessage()" class="send-btn">→</button>
    </div>
  </div>

  <script src="js/pastime-registry.js"></script>
  <script src="js/main.js"></script>

  <script>
    // ── Render diorama cards from registry ──────────────────────────────────
    // Cards are sorted by `order` in pastime-registry.js.
    // To reorder: change the `order` field there. Nothing here changes.
    function renderDioramaCards() {
      const grid = document.getElementById('dioramas-grid');
      if (!grid) return;

      PASTIME_REGISTRY_SORTED.forEach((pastime, index) => {
        const cardNumber = String(index + 1).padStart(2, '0');

        const a = document.createElement('a');
        a.href      = pastime.file;
        a.className = 'diorama-card fade-in';

        a.innerHTML = `
          <div class="card-number">${cardNumber}</div>
          <h3>${pastime.title}</h3>
          <p>${pastime.description}</p>
          <span class="explore-link">Explore →</span>
        `;

        grid.appendChild(a);
      });

      // Re-run scroll observer on newly created cards
      document.querySelectorAll('.diorama-card').forEach(el => observer.observe(el));
    }

    document.addEventListener('DOMContentLoaded', renderDioramaCards);
  </script>

</body>

</html>
