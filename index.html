<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="ISKCON ABIDS" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
  <title>ISKCON ABIDS Dioramas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <nav class="navbar">
    <div class="logo">
      <img src="images/logo.jpg" class="logo-img">
      <span>ISKCON <br> ABIDS</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="#about">About</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h1>Krishna's Divine Pastimes</h1>
      <p>Walk through the sacred stories of the Lord, brought to life through art and devotion</p>
      <a href="#dioramas" class="btn">Explore Dioramas</a>
    </div>
  </section>

  <section class="dioramas-section" id="dioramas">
    <p class="section-label">Sacred Pastimes</p>
    <h2 class="section-title">The Divine Lila</h2>
    <p class="section-subtitle">Select a diorama to explore the story</p>

    <div class="dioramas-grid" id="dioramas-grid"></div>
  </section>

  <button class="chat-toggle" onclick="toggleChat()">Ask Krishna</button>

  <div class="chat-window" id="chat-window">
    <div class="chat-header">
      <span>🛕 Krishna's Guide</span>
      <button onclick="toggleChat()" class="chat-close">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="Ask about Krishna..." onkeypress="handleKey(event)" />
      <button onclick="sendMessage()" class="send-btn">→</button>
    </div>
  </div>

  <script src="js/pastime-registry.js"></script>
  <script src="js/main.js"></script>

  <script>
    // ── Render diorama cards from registry ──────────────────────────────────
    function renderDioramaCards() {
      const grid = document.getElementById('dioramas-grid');
      if (!grid) return;

      PASTIME_REGISTRY_SORTED.forEach((pastime, index) => {
        const cardNumber = String(index + 1).padStart(2, '0');

        const a = document.createElement('a');
        a.href      = pastime.file;
        a.className = 'diorama-card';

        // Inline the background-image directly on .card-bg-img via a data attribute
        // We build the inner HTML with the image URL baked in — no CSS variable needed
        const imageUrl = pastime.image || '';

        a.innerHTML = `
          <div class="card-bg-img" style="background-image: url('${imageUrl}');"></div>
          <div class="card-overlay"></div>
          <div class="card-content">
            <div class="card-number">${cardNumber}</div>
            <h3>${pastime.title}</h3>
            <p>${pastime.description}</p>
            <span class="explore-link">Explore →</span>
          </div>
        `;

        grid.appendChild(a);
      });

      // Trigger scroll-fly animation after cards are in DOM
      requestAnimationFrame(() => {
        setupCardAnimations();
      });
    }

    function setupCardAnimations() {
      const cards = document.querySelectorAll('.diorama-card');

      // Use IntersectionObserver for the fly-in effect
      const flyObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            // Stagger each card slightly
            const card = entry.target;
            const delay = card.dataset.delay || 0;
            setTimeout(() => {
              card.classList.add('visible');
            }, delay);
            flyObserver.unobserve(card);
          }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

      cards.forEach((card, i) => {
        card.classList.add('card-hidden');
        card.dataset.delay = i * 80; // 80ms stagger between cards
        flyObserver.observe(card);
      });

      // Also observe section headings
      document.querySelectorAll('.section-title, .section-subtitle').forEach(el => {
        el.classList.add('fade-in');
        observer.observe(el);
      });
    }

    document.addEventListener('DOMContentLoaded', renderDioramaCards);
  </script>

</body>

</html>
